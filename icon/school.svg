<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#dbeafe"/>
  
  <!-- Open book base -->
  <path d="M12 42 L32 36 L52 42 L52 50 L32 44 L12 50 Z" fill="#ffffff" stroke="#2563eb" stroke-width="2" stroke-linejoin="round"/>
  <path d="M32 36 L32 44" stroke="#2563eb" stroke-width="1.5"/>
  
  <!-- Left page -->
  <path d="M14 42 L14 48 L32 44 L32 38" fill="#eff6ff" stroke="none"/>
  <!-- Right page -->
  <path d="M50 42 L50 48 L32 44 L32 38" fill="#dbeafe" stroke="none"/>
  
  <!-- Graduation cap top (mortar board) -->
  <polygon points="32,12 10,24 32,32 54,24" fill="#1e40af" stroke="#1e3a8a" stroke-width="1.5" stroke-linejoin="round"/>
  
  <!-- Cap highlight -->
  <polygon points="32,15 16,24 32,30 48,24" fill="#2563eb" stroke="none"/>
  
  <!-- Cap button on top -->
  <rect x="30" y="10" width="4" height="4" rx="2" fill="#3b82f6" stroke="#1e3a8a" stroke-width="1"/>
  
  <!-- Tassel string -->
  <path d="M34 12 Q42 14, 46 22" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel end -->
  <circle cx="46" cy="22" r="2.5" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
  <path d="M44 24 L46 28 L48 24" fill="#f59e0b" stroke="none"/>
</svg>
