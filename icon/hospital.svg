<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#fee2e2"/>
  
  <!-- White square background for cross -->
  <rect x="14" y="14" width="36" height="36" rx="6" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  
  <!-- Bold red cross - very clear and recognizable -->
  <rect x="26" y="16" width="12" height="32" rx="2" fill="#dc2626"/>
  <rect x="16" y="26" width="32" height="12" rx="2" fill="#dc2626"/>
  
  <!-- Inner white highlight on cross for depth -->
  <rect x="28" y="18" width="8" height="28" rx="1" fill="#ef4444" opacity="0.6"/>
  <rect x="18" y="28" width="28" height="8" rx="1" fill="#ef4444" opacity="0.6"/>
</svg>
